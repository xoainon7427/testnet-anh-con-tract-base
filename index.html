<!DOCTYPE html> <!-- Khai báo kiểu tài liệu là HTML5 để trình duyệt hiểu cách hiển thị -->
<html> <!-- Thẻ gốc bao quanh toàn bộ nội dung của trang web -->

<head>
    <!-- Phần đầu chứa các thông tin cấu hình, meta và tiêu đề (không hiển thị trực tiếp trên nội dung trang) -->
    <title>My Project</title> <!-- Tiêu đề của trang web, xuất hiện trên tab của trình duyệt -->
</head>

<body>
    <!-- Phần thân chứa tất cả các nội dung mà người dùng sẽ nhìn thấy trên màn hình -->
    <h1>Welcome to my GitHub Contribution</h1> <!-- Thẻ tiêu đề bậc 1 (thường là tiêu đề lớn nhất và quan trọng nhất) -->
</body>

</html>
